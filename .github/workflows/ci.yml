# WP-C5 — CI-poort: elke push/PR draait de linter en de volledige testsuite,
# zodat testdrift en kapotte imports niet meer stil op master belanden.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # zelfde als de Docker-image
          cache: pip
      - name: Installeer package + dev-deps
        run: pip install -e .[dev]
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Tests (pytest)
        env:
          # tests draaien zonder echte LLM-gateway of database; load_settings
          # eist deze twee (lokaal komen ze uit .env, die staat niet in git)
          ORQ_API_KEY: dummy
          NEO4J_PASSWORD: dummy
        run: pytest -q

  # NEBULA-HUD: de gecommitte bundel mag nooit uit de pas lopen met de bron
  hud:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: hud/package-lock.json
      - name: Bundel bouwen
        working-directory: hud
        run: npm ci && npm run build
      - name: Drift-check (dist == bron)
        run: git diff --exit-code -- src/span/server/static/hud
